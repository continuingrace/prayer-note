<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>기도의 방</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="기도의 방" />
  <meta name="theme-color" content="#0E0D0B" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- COVER SCREEN -->
  <div id="screen-cover" class="screen active">
    <div class="cover-bg">
      <div class="cover-grain"></div>
      <div class="cover-light"></div>
    </div>
    <div class="cover-content">
      <div class="cover-door-wrap">
        <svg class="cover-door-svg" viewBox="0 0 200 280" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Door frame -->
          <rect x="10" y="10" width="180" height="260" rx="4" stroke="#C9B99A" stroke-width="1.5" fill="none" opacity="0.4"/>
          <!-- Door arch top -->
          <path d="M30 90 Q100 20 170 90" stroke="#C9B99A" stroke-width="1" fill="none" opacity="0.3"/>
          <!-- Left panel -->
          <rect x="20" y="95" width="72" height="85" rx="2" stroke="#C9B99A" stroke-width="1" fill="rgba(201,185,154,0.05)" opacity="0.6"/>
          <!-- Right panel -->
          <rect x="108" y="95" width="72" height="85" rx="2" stroke="#C9B99A" stroke-width="1" fill="rgba(201,185,154,0.05)" opacity="0.6"/>
          <!-- Bottom left panel -->
          <rect x="20" y="190" width="72" height="65" rx="2" stroke="#C9B99A" stroke-width="1" fill="rgba(201,185,154,0.05)" opacity="0.6"/>
          <!-- Bottom right panel -->
          <rect x="108" y="190" width="72" height="65" rx="2" stroke="#C9B99A" stroke-width="1" fill="rgba(201,185,154,0.05)" opacity="0.6"/>
          <!-- Center gap line -->
          <line x1="100" y1="85" x2="100" y2="265" stroke="#C9B99A" stroke-width="1" opacity="0.5"/>
          <!-- Left handle -->
          <circle cx="89" cy="148" r="3" fill="#C9B99A" opacity="0.7"/>
          <!-- Right handle -->
          <circle cx="111" cy="148" r="3" fill="#C9B99A" opacity="0.7"/>
          <!-- Light glow through crack -->
          <line x1="100" y1="85" x2="100" y2="265" stroke="#F5E6C8" stroke-width="1.5" opacity="0.2"/>
        </svg>
      </div>
      <div class="cover-text">
        <p class="cover-subtitle">오늘도 여기 왔습니다</p>
        <h1 class="cover-title">기도의 방</h1>
        <button class="cover-enter-btn" id="btn-enter">
          <span>들어가기</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- AUTH SCREEN -->
  <div id="screen-auth" class="screen">
    <div class="auth-wrap">
      <button class="back-btn" id="btn-back-cover">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="auth-logo">
        <div class="auth-icon">✦</div>
        <h2>기도의 방</h2>
        <p>로그인하고 기도를 기록하세요</p>
      </div>

      <div id="auth-mode-login" class="auth-form">
        <div class="form-group">
          <label>이메일</label>
          <input type="email" id="login-email" placeholder="email@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button class="btn-primary full" id="btn-login">로그인</button>
        <div class="auth-divider"><span>또는</span></div>
        <button class="btn-google full" id="btn-google-login">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.707A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
          Google로 계속하기
        </button>
        <p class="auth-switch">계정이 없으신가요? <a href="#" id="switch-to-signup">회원가입</a></p>
      </div>

      <div id="auth-mode-signup" class="auth-form hidden">
        <div class="form-group">
          <label>이메일</label>
          <input type="email" id="signup-email" placeholder="email@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" id="signup-password" placeholder="8자 이상" autocomplete="new-password" />
        </div>
        <button class="btn-primary full" id="btn-signup">회원가입</button>
        <p class="auth-switch">이미 계정이 있으신가요? <a href="#" id="switch-to-login">로그인</a></p>
      </div>

      <div id="auth-message" class="auth-message hidden"></div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="screen-app" class="screen">
    <header class="app-header">
      <div class="header-left">
        <span class="header-logo">✦</span>
        <span class="header-title">기도의 방</span>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="btn-new-prayer" title="새 기도제목">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
        <button class="icon-btn" id="btn-settings-open" title="설정">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M4.2 15.8l1.4-1.4M14.4 5.6l1.4-1.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </header>

    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="prayers">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 1.5c-4.14 0-7.5 3.36-7.5 7.5s3.36 7.5 7.5 7.5 7.5-3.36 7.5-7.5-3.36-7.5-7.5-7.5zm0 3v4.5l3 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>기도제목</span>
      </button>
      <button class="tab-btn" data-tab="calendar">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="3" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M6 2v2M12 2v2M2 7h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span>달력</span>
      </button>
      <button class="tab-btn" data-tab="answered">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9l4 4 8-8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>응답됨</span>
      </button>
    </nav>

    <div class="tab-content active" id="tab-prayers">
      <div class="category-filter" id="category-filter">
        <button class="cat-chip active" data-cat="all">전체</button>
        <button class="cat-chip" data-cat="personal">개인</button>
        <button class="cat-chip" data-cat="family">가족</button>
        <button class="cat-chip" data-cat="church">교회</button>
        <button class="cat-chip" data-cat="nation">나라</button>
        <button class="cat-chip" data-cat="mission">선교</button>
        <button class="cat-chip" data-cat="work">직장·학업</button>
        <button class="cat-chip" data-cat="other">기타</button>
      </div>
      <div class="prayer-list" id="prayer-list">
        <div class="empty-state" id="empty-prayers">
          <div class="empty-icon">🙏</div>
          <p>아직 기도제목이 없어요</p>
          <span>+ 버튼을 눌러 첫 기도를 시작하세요</span>
        </div>
      </div>
    </div>

    <div class="tab-content" id="tab-calendar">
      <div class="calendar-wrap">
        <div class="calendar-header">
          <button class="cal-nav" id="cal-prev">‹</button>
          <span class="cal-month-label" id="cal-month-label"></span>
          <button class="cal-nav" id="cal-next">›</button>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
        <div class="cal-day-detail" id="cal-day-detail">
          <p class="cal-detail-hint">날짜를 선택하면 해당 날의 기도를 볼 수 있어요</p>
        </div>
      </div>
    </div>

    <div class="tab-content" id="tab-answered">
      <div class="prayer-list" id="answered-list">
        <div class="empty-state" id="empty-answered">
          <div class="empty-icon">✨</div>
          <p>아직 응답된 기도가 없어요</p>
          <span>기도가 응답되면 여기 모입니다</span>
        </div>
      </div>
    </div>
  </div>

  <!-- PRAYER MODAL -->
  <div id="modal-prayer" class="modal-overlay hidden">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <button class="modal-back" id="modal-close">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 10h10M5 10l4-4M5 10l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          닫기
        </button>
        <button class="modal-action-btn" id="modal-save">저장</button>
      </div>

      <div class="modal-body" id="modal-body">
        <div class="field-row">
          <input class="field-title" id="field-title" type="text" placeholder="기도제목을 입력하세요" />
        </div>
        <div class="field-row two-col">
          <select class="field-select" id="field-category">
            <option value="personal">개인</option>
            <option value="family">가족</option>
            <option value="church">교회</option>
            <option value="nation">나라</option>
            <option value="mission">선교</option>
            <option value="work">직장·학업</option>
            <option value="other">기타</option>
          </select>
          <select class="field-select" id="field-status">
            <option value="ongoing">기도 중</option>
            <option value="answered">응답됨</option>
            <option value="paused">잠시 멈춤</option>
          </select>
        </div>

        <div class="field-section">
          <div class="section-label">
            <span>시작일</span>
            <input type="date" class="field-date-inline" id="field-start-date" />
          </div>
          <textarea class="field-textarea" id="field-content" placeholder="기도 내용을 자유롭게 써보세요..."></textarea>
          <div class="scripture-row">
            <span class="scripture-icon">✦</span>
            <input class="field-scripture" id="field-scripture" type="text" placeholder="떠오른 말씀 구절 (선택)" />
          </div>
        </div>

        <div id="prayer-log-section" class="hidden">
          <div class="section-divider"></div>
          <div class="section-label-row">
            <span class="section-label-text">기도 이력</span>
            <button class="btn-add-log" id="btn-add-log">+ 이어 기도하기</button>
          </div>
          <div id="prayer-log-list"></div>
          <div id="new-log-form" class="new-log-form hidden">
            <div class="section-label">
              <span>날짜</span>
              <input type="date" class="field-date-inline" id="log-date" />
            </div>
            <textarea class="field-textarea sm" id="log-content" placeholder="오늘의 기도..."></textarea>
            <div class="scripture-row">
              <span class="scripture-icon">✦</span>
              <input class="field-scripture" id="log-scripture" type="text" placeholder="말씀, 응답, 느낀 점..." />
            </div>
            <button class="btn-primary sm" id="btn-save-log">기록 추가</button>
          </div>
        </div>

        <div id="btn-delete-wrap" class="hidden">
          <div class="section-divider"></div>
          <button class="btn-delete" id="btn-delete-prayer">이 기도제목 삭제</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SETTINGS PANEL -->
  <div id="panel-settings" class="side-panel hidden">
    <div class="panel-header">
      <h3>설정</h3>
      <button class="icon-btn" id="btn-settings-close">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 5l10 10M15 5l-10 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="panel-body">
      <div class="settings-user" id="settings-user-info"></div>
      <div class="settings-section">
        <div class="settings-label">데이터 백업 / 복구</div>
        <button class="btn-settings-item" id="btn-export">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v8M5 7l3 3 3-3M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          JSON으로 내보내기
        </button>
        <label class="btn-settings-item" for="import-file">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 10V2M5 5l3-3 3 3M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          JSON 파일 불러오기
          <input type="file" id="import-file" accept=".json" class="hidden" />
        </label>
      </div>
      <div class="settings-section">
        <button class="btn-logout" id="btn-logout">로그아웃</button>
      </div>
    </div>
  </div>
  <div class="panel-overlay hidden" id="panel-overlay"></div>

  <div id="toast" class="toast hidden"></div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/db.js"></script>
  <script src="js/prayers.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
