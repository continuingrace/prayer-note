<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>기도의 방</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="기도의 방" />
  <meta name="theme-color" content="#F7F4EF" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── COVER ── -->
  <div id="screen-cover" class="screen active">
    <div class="cover-paper-bg"></div>
    <div class="cover-inner">

      <!-- 손그림 느낌 폴더 SVG -->
      <svg class="cover-folder-svg" viewBox="0 0 180 150" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- 폴더 탭 -->
        <path d="M14 42 C14 42 14 38 18 36 L58 36 C60 36 62 38 66 42 L166 42 C168 42 170 44 170 46 L170 130 C170 132 168 134 166 134 L14 134 C12 134 10 132 10 130 L10 46 C10 44 12 42 14 42Z"
          fill="#FAF8F4" stroke="#C8BFB4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- 탭 부분 -->
        <path d="M14 42 L14 36 C14 34 16 32 18 32 L60 32 C62 32 64 34 66 36 L66 42"
          fill="#EDE9E2" stroke="#C8BFB4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- 줄 1 -->
        <line x1="28" y1="68" x2="152" y2="68" stroke="#DDD8D0" stroke-width="1.2" stroke-linecap="round"/>
        <!-- 줄 2 -->
        <line x1="28" y1="82" x2="130" y2="82" stroke="#DDD8D0" stroke-width="1.2" stroke-linecap="round"/>
        <!-- 줄 3 -->
        <line x1="28" y1="96" x2="142" y2="96" stroke="#DDD8D0" stroke-width="1.2" stroke-linecap="round"/>
        <!-- 줄 4 -->
        <line x1="28" y1="110" x2="118" y2="110" stroke="#DDD8D0" stroke-width="1.2" stroke-linecap="round"/>
        <!-- 손그림 느낌 작은 십자가 -->
        <line x1="88" y1="54" x2="88" y2="62" stroke="#C8BFB4" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="84" y1="58" x2="92" y2="58" stroke="#C8BFB4" stroke-width="1.5" stroke-linecap="round"/>
        <!-- 클립 -->
        <path d="M148 30 L148 46" stroke="#C8BFB4" stroke-width="2" stroke-linecap="round"/>
        <path d="M144 30 C144 27 152 27 152 30 L152 44 C152 47 144 47 144 44 L144 32 C144 30 150 30 150 32 L150 43"
          fill="none" stroke="#BFB9B0" stroke-width="1.5" stroke-linecap="round"/>
      </svg>

      <div class="cover-words">
        <p class="cover-label">Prayer Note</p>
        <h1 class="cover-title">기도의 방</h1>
        <p class="cover-sub">오늘의 기도를 기록해보세요</p>
      </div>

      <button class="cover-btn" id="btn-enter">
        들어가기
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 7h9M8 3.5l3.5 3.5L8 10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

  <!-- ── APP ── -->
  <div id="screen-app" class="screen">
    <header class="app-header">
      <span class="header-title">기도의 방</span>
      <div class="header-right">
        <button class="icon-btn" id="btn-new-prayer">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
        <button class="icon-btn" id="btn-settings-open">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 11.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z" stroke="currentColor" stroke-width="1.4"/><path d="M14.7 11a1.2 1.2 0 00.24 1.32l.04.04a1.45 1.45 0 010 2.06 1.45 1.45 0 01-2.06 0l-.04-.04a1.2 1.2 0 00-1.32-.24 1.2 1.2 0 00-.73 1.1V15.5a1.45 1.45 0 01-2.9 0v-.07a1.2 1.2 0 00-.79-1.1 1.2 1.2 0 00-1.32.24l-.04.04a1.45 1.45 0 01-2.06-2.06l.04-.04A1.2 1.2 0 004.76 11a1.2 1.2 0 00-1.1-.73H3.5a1.45 1.45 0 010-2.9h.07A1.2 1.2 0 004.76 6.1a1.2 1.2 0 00-.24-1.32l-.04-.04a1.45 1.45 0 012.06-2.06l.04.04A1.2 1.2 0 007.9 3a1.2 1.2 0 00.73-1.1V1.5a1.45 1.45 0 012.9 0v.07A1.2 1.2 0 0012.26 3a1.2 1.2 0 001.32-.24l.04-.04a1.45 1.45 0 012.06 2.06l-.04.04A1.2 1.2 0 0015.4 6.1a1.2 1.2 0 001.1.73h.07a1.45 1.45 0 010 2.9h-.07a1.2 1.2 0 00-1.1.73l-.7-.46z" stroke="currentColor" stroke-width="1.4"/></svg>
        </button>
      </div>
    </header>

    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="prayers">
        <svg width="17" height="17" viewBox="0 0 17 17" fill="none"><path d="M8.5 2C5.46 2 3 4.46 3 7.5c0 1.74.8 3.3 2.05 4.34L4.5 15l3.5-1.5 3.5 1.5-.55-3.16A5.49 5.49 0 0014 7.5C14 4.46 11.54 2 8.5 2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        <span>기도제목</span>
      </button>
      <button class="tab-btn" data-tab="calendar">
        <svg width="17" height="17" viewBox="0 0 17 17" fill="none"><rect x="2" y="3" width="13" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M6 2v2M11 2v2M2 7h13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span>달력</span>
      </button>
      <button class="tab-btn" data-tab="answered">
        <svg width="17" height="17" viewBox="0 0 17 17" fill="none"><path d="M3 8.5l3.5 3.5 7.5-7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>응답됨</span>
      </button>
    </nav>

    <!-- 기도제목 탭 -->
    <div class="tab-content active" id="tab-prayers">
      <div class="category-filter" id="category-filter">
        <button class="cat-chip active" data-cat="all">전체</button>
        <button class="cat-chip" data-cat="personal">개인</button>
        <button class="cat-chip" data-cat="family">가족</button>
        <button class="cat-chip" data-cat="church">교회</button>
        <button class="cat-chip" data-cat="nation">나라</button>
        <button class="cat-chip" data-cat="mission">선교</button>
        <button class="cat-chip" data-cat="work">직장·학업</button>
        <button class="cat-chip" data-cat="other">기타</button>
      </div>
      <div class="prayer-list" id="prayer-list">
        <div class="empty-state" id="empty-prayers">
          <div class="empty-icon">🙏</div>
          <p>아직 기도제목이 없어요</p>
          <span>+ 버튼을 눌러 첫 기도를 시작하세요</span>
        </div>
      </div>
    </div>

    <!-- 달력 탭 -->
    <div class="tab-content" id="tab-calendar">
      <div class="calendar-wrap">
        <div class="calendar-header">
          <button class="cal-nav" id="cal-prev">‹</button>
          <span class="cal-month-label" id="cal-month-label"></span>
          <button class="cal-nav" id="cal-next">›</button>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
        <div class="cal-day-detail" id="cal-day-detail">
          <p class="cal-detail-hint">날짜를 선택하면 기도를 볼 수 있어요</p>
        </div>
      </div>
    </div>

    <!-- 응답됨 탭 -->
    <div class="tab-content" id="tab-answered">
      <div class="prayer-list" id="answered-list">
        <div class="empty-state" id="empty-answered">
          <div class="empty-icon">✨</div>
          <p>아직 응답된 기도가 없어요</p>
          <span>기도가 응답되면 여기 모입니다</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 기도 모달 -->
  <div id="modal-prayer" class="modal-overlay hidden">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <button class="modal-back" id="modal-close">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3.5 8h9M3.5 8l3.5-3.5M3.5 8l3.5 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          닫기
        </button>
        <button class="modal-action-btn" id="modal-save">저장</button>
      </div>
      <div class="modal-body">
        <input class="field-title" id="field-title" type="text" placeholder="기도제목을 입력하세요" />
        <div class="field-row two-col">
          <select class="field-select" id="field-category">
            <option value="personal">개인</option>
            <option value="family">가족</option>
            <option value="church">교회</option>
            <option value="nation">나라</option>
            <option value="mission">선교</option>
            <option value="work">직장·학업</option>
            <option value="other">기타</option>
          </select>
          <select class="field-select" id="field-status">
            <option value="ongoing">기도 중</option>
            <option value="answered">응답됨</option>
            <option value="paused">잠시 멈춤</option>
          </select>
        </div>
        <div class="field-section">
          <div class="section-label">
            <span>시작일</span>
            <input type="date" class="field-date-inline" id="field-start-date" />
          </div>
          <textarea class="field-textarea" id="field-content" placeholder="기도 내용을 자유롭게 써보세요..."></textarea>
          <div class="scripture-row">
            <span class="scripture-icon">†</span>
            <input class="field-scripture" id="field-scripture" type="text" placeholder="떠오른 말씀 구절 (선택)" />
          </div>
        </div>

        <div id="prayer-log-section" class="hidden">
          <div class="section-divider"></div>
          <div class="section-label-row">
            <span class="section-label-text">기도 이력</span>
            <button class="btn-add-log" id="btn-add-log">+ 이어 기도하기</button>
          </div>
          <div id="prayer-log-list"></div>
          <div id="new-log-form" class="new-log-form hidden">
            <div class="section-label">
              <span>날짜</span>
              <input type="date" class="field-date-inline" id="log-date" />
            </div>
            <textarea class="field-textarea sm" id="log-content" placeholder="오늘의 기도..."></textarea>
            <div class="scripture-row">
              <span class="scripture-icon">†</span>
              <input class="field-scripture" id="log-scripture" type="text" placeholder="말씀, 응답, 느낀 점..." />
            </div>
            <button class="btn-primary sm" id="btn-save-log">기록 추가</button>
          </div>
        </div>

        <div id="btn-delete-wrap" class="hidden">
          <div class="section-divider"></div>
          <button class="btn-delete" id="btn-delete-prayer">이 기도제목 삭제</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 설정 패널 -->
  <div id="panel-settings" class="side-panel">
    <div class="panel-header">
      <h3>설정</h3>
      <button class="icon-btn" id="btn-settings-close">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 4l10 10M14 4l-10 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="panel-body">
      <div class="settings-section">
        <div class="settings-label">데이터 백업 / 복구</div>
        <button class="btn-settings-item" id="btn-export">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 2v8M5 7l2.5 3 2.5-3M2 12h11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          JSON으로 내보내기
        </button>
        <label class="btn-settings-item" for="import-file">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 9V1M5 4l2.5-3 2.5 3M2 12h11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          JSON 파일 불러오기
          <input type="file" id="import-file" accept=".json" class="hidden" />
        </label>
      </div>
      <div class="settings-section">
        <div class="settings-label">저장 공간</div>
        <div class="storage-info" id="storage-info"></div>
      </div>
    </div>
  </div>
  <div class="panel-overlay hidden" id="panel-overlay"></div>
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
