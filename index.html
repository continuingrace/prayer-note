<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>기도의 방</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="기도의 방" />
  <meta name="theme-color" content="#F8F6F2" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Wanted+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- COVER -->
  <div id="screen-cover" class="screen active">
    <div class="cover-inner">
      <svg class="cover-folder-svg" viewBox="0 0 160 130" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 38 C12 36 13.5 34.5 15.5 34.5 L55 34.5 C57 34.5 58.5 35.5 60 37.5 L65 44 L148 44 C150 44 152 46 152 48 L152 118 C152 120 150 122 148 122 L12 122 C10 122 8 120 8 118 L8 42 C8 40 10 38 12 38 Z"
          fill="#FFFFFF" stroke="#C8C0B6" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M12 38 L12 44 L65 44 L60 37.5 C58.5 35.5 57 34.5 55 34.5 L15.5 34.5 C13.5 34.5 12 36 12 38 Z"
          fill="#EDE9E2" stroke="#C8C0B6" stroke-width="1.6" stroke-linejoin="round"/>
        <line x1="24" y1="64"  x2="136" y2="64"  stroke="#DDD8D0" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="24" y1="77"  x2="116" y2="77"  stroke="#DDD8D0" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="24" y1="90"  x2="128" y2="90"  stroke="#DDD8D0" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="24" y1="103" x2="100" y2="103" stroke="#DDD8D0" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <div>
        <p class="cover-eyebrow">Prayer Note</p>
        <h1 class="cover-title">기도의 방</h1>
        <p class="cover-desc">오늘의 기도를 기록해보세요</p>
      </div>
      <button class="cover-btn" id="btn-enter">
        들어가기
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 7h9M8 3.5 11.5 7 8 10.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

  <!-- APP -->
  <div id="screen-app" class="screen">
    <header class="app-header">
      <div class="header-left">
        <!-- 홈(표지) 돌아가기 버튼 -->
        <button class="icon-btn" id="btn-go-cover" title="처음으로">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M2 7.5L9 2l7 5.5V16a1 1 0 01-1 1H12v-4H6v4H3a1 1 0 01-1-1V7.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
        </button>
        <span class="header-title">기도의 방</span>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="btn-new-prayer">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
        <button class="icon-btn" id="btn-settings-open">
          <svg width="19" height="19" viewBox="0 0 19 19" fill="none"><circle cx="9.5" cy="9.5" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M9.5 1.5v2M9.5 15.5v2M1.5 9.5h2M15.5 9.5h2M3.6 3.6l1.4 1.4M14 14l1.4 1.4M3.6 15.4l1.4-1.4M14 5l1.4-1.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </button>
      </div>
    </header>

    <nav class="tab-bar">
      <!-- 말풍선 → 기도손 이모지 아이콘 -->
      <button class="tab-btn active" data-tab="prayers">
        <span class="tab-emoji">🙏</span>
        <span>기도제목</span>
      </button>
      <button class="tab-btn" data-tab="calendar">
        <svg width="17" height="17" viewBox="0 0 17 17" fill="none"><rect x="2" y="3" width="13" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M6 2v2M11 2v2M2 7h13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span>달력</span>
      </button>
      <button class="tab-btn" data-tab="answered">
        <svg width="17" height="17" viewBox="0 0 17 17" fill="none"><path d="M3 8.5l3.5 3.5 7.5-7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>응답됨</span>
      </button>
    </nav>

    <!-- 기도제목 탭 -->
    <div class="tab-content active" id="tab-prayers">
      <div class="category-filter" id="category-filter">
        <button class="cat-chip active" data-cat="all">전체</button>
        <button class="cat-chip" data-cat="personal">개인</button>
        <button class="cat-chip" data-cat="family">가족</button>
        <button class="cat-chip" data-cat="church">교회</button>
        <button class="cat-chip" data-cat="nation">나라</button>
        <button class="cat-chip" data-cat="mission">선교</button>
        <button class="cat-chip" data-cat="work">직장</button>
        <button class="cat-chip" data-cat="other">기타</button>
      </div>
      <div class="prayer-list" id="prayer-list">
        <div class="empty-state" id="empty-prayers">
          <div class="empty-icon">🙏</div>
          <p>아직 기도제목이 없어요</p>
          <span>+ 버튼을 눌러 첫 기도를 시작하세요</span>
        </div>
      </div>
    </div>

    <!-- 달력 탭 -->
    <div class="tab-content" id="tab-calendar">
      <div class="calendar-wrap">
        <div class="calendar-header">
          <button class="cal-nav" id="cal-prev">‹</button>
          <span class="cal-month-label" id="cal-month-label"></span>
          <button class="cal-nav" id="cal-next">›</button>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
        <div class="cal-day-detail" id="cal-day-detail">
          <p class="cal-detail-hint">날짜를 선택하면 기도를 볼 수 있어요</p>
        </div>
      </div>
    </div>

    <!-- 응답됨 탭 -->
    <div class="tab-content" id="tab-answered">
      <div class="prayer-list" id="answered-list">
        <div class="empty-state" id="empty-answered">
          <div class="empty-icon">✨</div>
          <p>아직 응답된 기도가 없어요</p>
          <span>기도가 응답되면 여기 모입니다</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 기도 모달 -->
  <div id="modal-prayer" class="modal-overlay hidden">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <button class="modal-back" id="modal-close">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3.5 8h9M3.5 8 7 4.5M3.5 8 7 11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          닫기
        </button>
        <span class="modal-title-label" id="modal-title-label">새 기도제목</span>
        <button class="modal-action-btn" id="modal-save">저장</button>
      </div>
      <div class="modal-body">
        <input class="field-title" id="field-title" type="text" placeholder="기도제목을 입력하세요" />
        <div class="field-row two-col">
          <select class="field-select" id="field-category">
            <option value="personal">개인</option>
            <option value="family">가족</option>
            <option value="church">교회</option>
            <option value="nation">나라</option>
            <option value="mission">선교</option>
            <option value="work">직장</option>
            <option value="other">기타</option>
          </select>
          <select class="field-select" id="field-status">
            <option value="ongoing">기도 중</option>
            <option value="answered">응답됨</option>
            <option value="paused">잠시 멈춤</option>
          </select>
        </div>
        <div class="field-section">
          <div class="section-label">
            <span>시작일</span>
            <input type="date" class="field-date-inline" id="field-start-date" />
          </div>
          <textarea class="field-textarea" id="field-content" placeholder="기도 내용을 자유롭게 써보세요..."></textarea>
          <div class="scripture-row">
            <span class="scripture-icon">†</span>
            <input class="field-scripture" id="field-scripture" type="text" placeholder="떠오른 말씀 구절 (선택)" />
          </div>
        </div>

        <div id="prayer-log-section" class="hidden">
          <div class="section-divider"></div>
          <div class="section-label-row">
            <span class="section-label-text">기도 이력</span>
            <button class="btn-add-log" id="btn-add-log">+ 이어 기도하기</button>
          </div>
          <div id="prayer-log-list"></div>
          <div id="new-log-form" class="new-log-form hidden">
            <div class="section-label">
              <span>날짜</span>
              <input type="date" class="field-date-inline" id="log-date" />
            </div>
            <textarea class="field-textarea sm" id="log-content" placeholder="오늘의 기도..."></textarea>
            <div class="scripture-row">
              <span class="scripture-icon">†</span>
              <input class="field-scripture" id="log-scripture" type="text" placeholder="말씀, 응답, 느낀 점..." />
            </div>
            <button class="btn-primary sm" id="btn-save-log">기록 추가</button>
          </div>
        </div>

        <div id="btn-delete-wrap" class="hidden">
          <div class="section-divider"></div>
          <button class="btn-delete" id="btn-delete-prayer">이 기도제목 삭제</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 설정 -->
  <div id="panel-settings" class="side-panel">
    <div class="panel-header">
      <h3>설정</h3>
      <button class="icon-btn" id="btn-settings-close">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 4l10 10M14 4 4 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="panel-body">
      <div class="settings-section">
        <div class="settings-label">데이터 백업 / 복구</div>
        <button class="btn-settings-item" id="btn-export">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 2v8M5 7l2.5 3 2.5-3M2 12h11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          JSON으로 내보내기
        </button>
        <label class="btn-settings-item" for="import-file">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 9V1M5 4l2.5-3 2.5 3M2 12h11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          JSON 파일 불러오기
          <input type="file" id="import-file" accept=".json" class="hidden" />
        </label>
      </div>
      <div class="settings-section">
        <div class="settings-label">저장 공간</div>
        <div class="storage-info" id="storage-info"></div>
      </div>
    </div>
  </div>
  <div class="panel-overlay hidden" id="panel-overlay"></div>
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
